<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if(localStorage.getItem('userRol') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Reportes - SISCONTED</title>
    <script src="api.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #a855f7; 
            --accent-glow: rgba(168, 85, 247, 0.4);
            --success: #10b981; 
            --profit: #10b981; 
            --danger: #ef4444; 
            --bg: #05060f;
            --card-bg: rgba(31, 41, 55, 0.5);
            --text-main: #f3f4f6;
            --text-muted: #94a3b8;
            --info: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
            color: var(--text-main); 
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header { 
            background: rgba(17, 24, 39, 0.8); 
            backdrop-filter: blur(20px);
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin: 0;
        }

        .container { padding: 40px; max-width: 1200px; margin: auto; }

        .filter-grid {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            align-items: center;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { 
            font-size: 0.75rem; 
            color: var(--accent); 
            font-weight: 700; 
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input { 
            padding: 12px 15px; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: white; 
            outline: none;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .resumen-global-container {
            display: flex;
            gap: 20px;
            grid-column: span 2;
        }

        .resumen-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            transition: 0.3s;
        }
        .resumen-box:hover { border-color: var(--primary); transform: translateY(-3px); }
        .box-ventas { border-bottom: 3px solid var(--info); }
        .box-ganancias { border-bottom: 3px solid var(--profit); }

        .resumen-box small { 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            display: block; 
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .resumen-box h2 { 
            margin: 0; 
            font-size: 1.6rem; 
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .report-card {
            background: var(--card-bg);
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .report-card:hover { 
            transform: translateX(10px); 
            border-color: var(--accent);
            background: rgba(45, 55, 75, 0.6);
        }

        .btn { 
            border: none; 
            padding: 8px 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-view { background: var(--info); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }
        .btn-del { background: rgba(239, 68, 68, 0.08); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-del:hover { background: var(--danger); color: white; }
        .btn-back { 
            background: rgba(255, 255, 255, 0.05); 
            color: #cbd5e1; 
            padding: 10px 18px; 
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }
        .btn-back:hover { background: var(--border); color: white; transform: translateX(-5px); }

        .tag { 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 0.7rem; 
            background: rgba(168, 85, 247, 0.1); 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        #modal-detalle {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(15px);
        }
        .modal-content {
            background: var(--bg); 
            padding: 40px; 
            border-radius: 30px;
            width: 90%; 
            max-width: 900px; 
            max-height: 85vh; 
            overflow-y: auto;
            border: 1px solid var(--border); 
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .close-modal { 
            position: absolute; 
            top: 20px; right: 25px; 
            cursor: pointer; 
            font-size: 2.5rem; 
            color: var(--danger); 
            transition: 0.3s;
        }
        .close-modal:hover { transform: rotate(90deg); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th { 
            background: rgba(255, 255, 255, 0.03); 
            color: var(--accent); 
            padding: 10px 12px; 
            text-align: left; 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }

        .m-dato { 
            background: rgba(0, 0, 0, 0.3); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
        }
        .m-dato label { 
            display: block; 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .m-dato span { font-size: 1.4rem; font-weight: 800; font-family: 'Orbitron', sans-serif; }
        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-glow); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
            .main { padding: 20px; overflow-y: visible; }
            .grid { grid-template-columns: 1fr; }
            .modal-content { width: 95%; padding: 20px; }
        }
        
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(12px);
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .stat-card small { color: var(--text-muted); font-family: 'Orbitron', sans-serif; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { margin: 0; font-family: 'Orbitron', sans-serif; font-size: 1.6rem; }
        
        .filter-bar {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            backdrop-filter: blur(10px);
        }
        .filter-item { flex: 1; min-width: 150px; display: flex; flex-direction: column; gap: 8px; }
        .filter-item label { color: var(--primary-light); font-size: 0.7rem; font-weight: 700; font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        .btn-action-group { display: flex; gap: 12px; min-width: 320px; }
        
        .balance-card {
            grid-column: span 1;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid var(--success);
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        
        @media (max-width: 1100px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .btn-action-group { width: 100%; }
        }
        /* Estilos Analítica */
        .chart-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-top: 15px;
            max-height: 450px;
            overflow-y: auto;
        }
        .chart-row {
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }
        .chart-label {
            width: 180px;
            font-size: 0.85rem;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bar-wrapper {
            flex: 1;
            height: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #06b6d4);
            border-radius: 4px;
            transition: width 1s ease-out;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.3);
        }
        .bar-value {
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
        .analitica-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .top-btn {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }
        .top-btn.active {
            background: #0ea5e9;
            border-color: #0ea5e9;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 1.5rem;">📊</span>
        <h1>REPORTES E HISTORIAL</h1>
    </div>
    <button onclick="window.location.href='admin.html'" class="btn btn-back">🔙 Volver al Panel</button>
</header>

<div class="container">
    <div class="stats-dashboard">
        <div class="stat-card" style="border-left: 5px solid var(--info);">
            <small>Venta Acumulada (Bruta)</small>
            <h2 id="total-v-filtro" style="color: var(--info);">$ 0</h2>
        </div>
        <div class="stat-card" style="border-left: 5px solid var(--profit);">
            <small>Ganancia Acumulada</small>
            <h2 id="total-g-filtro" style="color: var(--profit);">$ 0</h2>
        </div>
        <div class="stat-card" style="border-left: 5px solid #f59e0b; background: rgba(245, 158, 11, 0.05);">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <small>Liquidación de IVA</small>
                <div style="text-align:right;">
                    <div style="font-size:0.6rem; color:#94a3b8; margin-bottom:2px;">DÉBITO: <span id="iva-ventas-val" style="color:var(--text-main)">$0</span></div>
                    <div style="font-size:0.6rem; color:#94a3b8;">CRÉDITO: <span id="iva-compras-val" style="color:var(--text-main)">$0</span></div>
                </div>
            </div>
            <h2 id="total-iva-neto" style="color: #f59e0b; margin-top:5px;">$ 0</h2>
            <small id="iva-label-estado" style="font-size:0.6rem; margin-top:2px;">SALDO A PAGAR DIAN</small>
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-item">
            <label>DESDE</label>
            <input type="date" id="f-inicio" onchange="cargarHistorial()">
        </div>
        <div class="filter-item">
            <label>HASTA</label>
            <input type="date" id="f-fin" onchange="cargarHistorial()">
        </div>
        <div class="filter-item" style="flex: 1.5;">
            <label>ADMINISTRADOR</label>
            <input type="text" id="f-admin" placeholder="Buscar administrador..." onkeyup="cargarHistorial()">
        </div>
        <div class="btn-action-group">
            <button class="btn" onclick="exportarResumenExcel()" style="flex:1; background:#1D6F42; padding: 15px;">📊 Resumen</button>
            <button class="btn" onclick="imprimirVolanteDIAN()" style="flex:1; background:#e11d48; padding: 15px;">📄 Factura Impuestos (PDF)</button>
            <button class="btn" onclick="exportarExcelDIAN()" style="flex:1; background:#15803d; padding: 15px;">📊 Factura Impuestos (Excel)</button>
            <button class="btn" onclick="exportarResumenFiltrado()" style="flex:1; background:#0ea5e9; padding: 15px;">📑 Filtrados</button>
            <button class="btn" onclick="abrirAnalitica()" style="flex:1; background:#0891b2; padding: 15px;">📈 Analítica</button>
        </div>
    </div>

    <div id="lista-reportes"></div>
</div>

<div id="modal-detalle">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModal()">&times;</span>
        <h2 id="modal-titulo" style="color: var(--accent); margin-top: 0;">Detalle</h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px;">
            <div class="m-dato"><label>Total Venta</label><span id="md-venta" style="color: var(--info);"></span></div>
            <div class="m-dato"><label>Total Ganancia</label><span id="md-ganancia" style="color: var(--profit);"></span></div>
            <div class="m-dato"><label>Admin</label><span id="md-admin" style="font-size: 0.8rem;"></span></div>
            <div class="m-dato"><label>Pedidos</label><span id="md-cant" style="font-size: 1rem;"></span></div>
            <div class="m-dato" style="grid-column: span 1; display:flex; flex-direction:column; gap:8px;">
                <button class="btn" onclick="exportarDetalleDetalladoExcel()" style="background:#1D6F42; padding:8px; font-size:0.6rem;">📊 Detallado (18 col)</button>
                <button class="btn" onclick="exportarDetalleSimpleExcel()" style="background:#8b5cf6; padding:8px; font-size:0.6rem;">📈 Simple (12 col)</button>
            </div>
        </div>
        
        <div id="modal-tabla-container"></div>
    </div>
</div>

<div id="modal-detalle-pedido" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter:blur(10px);">
    <div class="modal-content" style="width: 80%; max-width: 600px;">
        <span class="close-modal" onclick="cerrarPedidoModal()">&times;</span>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="ped-modal-titulo" style="color: var(--accent); margin:0;">Detalles del Pedido</h3>
            <button id="btn-export-pedido" class="btn btn-view" style="background:#1D6F42; color:white; font-size:0.7rem;">📊 Exportar Pedido</button>
        </div>
        <div id="ped-modal-tabla"></div>
    </div>
</div>


    <!-- MODAL ANALITICA -->
    <div id="modal-analitica" class="modal-backdrop-analitica" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter:blur(10px);">
        <div class="modal-content" style="width: 90%; max-width: 900px; padding: 30px;">
            <span class="close-modal" onclick="cerrarAnalitica()">&times;</span>
            <h2 style="font-family: 'Orbitron', sans-serif; margin: 0 0 25px 0; color: var(--primary); display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 1.8rem;">📈</span> ANALÍTICA DE PRODUCTOS
            </h2>
            
            <div class="analitica-controls">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 0.75rem; color: #94a3b8; font-family: 'Orbitron', sans-serif;">MOSTRAR TOP:</label>
                    <input type="number" id="analitica-limite" value="10" min="1" max="100" 
                           style="width: 70px; padding: 8px; font-weight: bold; text-align: center; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.3); color: white;" 
                           onchange="renderizarAnalitica()">
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button id="btn-top-mas" class="top-btn active" onclick="cambiarOrdenAnalitica('desc')">Más Vendidos</button>
                    <button id="btn-top-menos" class="top-btn" onclick="cambiarOrdenAnalitica('asc')">Menos Vendidos</button>
                </div>

                <div style="display: flex; gap: 5px; margin-left: 10px; border-left: 1px solid #334155; padding-left: 15px;">
                    <button id="btn-metrica-cant" class="top-btn active" onclick="setMetricaAnalitica('cant')">📦 Por Cantidad</button>
                    <button id="btn-metrica-utilidad" class="top-btn" onclick="setMetricaAnalitica('utilidad')">💎 Por Utilidad</button>
                </div>

                <div style="margin-left: auto;">
                    <button class="btn" style="background: #1D6F42; padding: 10px 20px;" onclick="exportarAnaliticaExcel()">📊 Exportar Ranking (Excel)</button>
                </div>
            </div>

            <div id="chart-container" class="chart-container">
                <!-- Las barras se generarán aquí -->
            </div>
        </div>
    </div>

    <script>
        let historialGlobal = [];
        let productosDB = [];

        function verPDFDIAN(id) {
        API.obtenerDocumentoDIAN(id, 'pdf').then(url => window.open(url, '_blank')).catch(e => alert(e.message));
    }
    function verXMLDIAN(id) {
        API.obtenerDocumentoDIAN(id, 'xml').then(url => window.open(url, '_blank')).catch(e => alert(e.message));
    }

    async function cargarHistorial() {
            try {
                const config = await API.getConfig();
                if(config.empresa && config.empresa.tema) {
                    API.applyTheme(config.empresa.tema);
                }
                historialGlobal = await API.getReportes();
                productosDB = await API.getProductos();
                const fIn = document.getElementById('f-inicio').value;
                const fFi = document.getElementById('f-fin').value;
                const fAdmin = document.getElementById('f-admin').value.toLowerCase();
                
                let html = "";
                let sumaVentasTotal = 0;
                let sumaGananciasTotal = 0;
                let sumaIvaVentas = 0;
                let sumaBaseVentas = 0;
                let sumaIvaCompras = 0;
                let sumaBaseCompras = 0;

                const ingresos = await API.getIngresos();
                const facturasCompras = await API.getFacturasCompras();

                const filtrados = [...historialGlobal].reverse().filter(rep => {
                    const fRepo = API.getFechaLocal(Number(rep.idReporte));
                    const coincideFecha = (!fIn || fRepo >= fIn) && (!fFi || fRepo <= fFi);
                    const coincideAdmin = !fAdmin || (rep.admin && rep.admin.toLowerCase().includes(fAdmin));
                    return coincideFecha && coincideAdmin;
                });

                // --- CÁLCULO DE IVA POR MARGEN (Ventas - Costos) ---
                filtrados.forEach(rep => {
                    const vCorregido = Math.round(parseFloat(rep.ventasRaw || 0));
                    const gCorregido = Math.round(parseFloat(rep.gananciaRaw || 0));

                    sumaVentasTotal += vCorregido;
                    sumaGananciasTotal += gCorregido;

                    // Iterar pedidos para precisión unitaria
                    rep.pedidos.forEach(p => {
                        p.items.forEach(it => {
                            const cant = parseInt(it.cantidad || 0);
                            const pVenta = parseFloat(it.precioVenta || it.precio || 0);
                            const pCompra = parseFloat(it.precioCompra || 0);
                            const ivaPerc = parseFloat(it.iva || 0);
                            
                            if (ivaPerc > 0) {
                                // IVA en la Venta
                                const subV = pVenta * cant;
                                const baseV = Math.round(subV / (1 + (ivaPerc / 100)));
                                const ivaV = subV - baseV;
                                sumaIvaVentas += ivaV;
                                sumaBaseVentas += baseV;

                                // IVA en el Costo (Crédito Fiscal Unitario)
                                const subC = pCompra * cant;
                                const baseC = Math.round(subC / (1 + (ivaPerc / 100)));
                                const ivaC = subC - baseC;
                                sumaIvaCompras += ivaC;
                                sumaBaseCompras += baseC;
                            } else {
                                // Exento / Excluido
                                sumaBaseVentas += (pVenta * cant);
                                sumaBaseCompras += (pCompra * cant);
                            }
                        });
                    });

                        </div>
                    </div>`;
                });

                const saldoNeto = sumaIvaVentas - sumaIvaCompras;

                document.getElementById('lista-reportes').innerHTML = html || "<p align='center'>No hay resultados.</p>";

                document.getElementById('lista-reportes').innerHTML = "<p align='center'>Error al cargar el historial.</p>";

            </tfoot></table>`;
            
            document.getElementById('ped-modal-tabla').innerHTML = html;

        async function eliminarReporte(id) {
            if (!confirm("¿Seguro que deseas eliminar este reporte del historial? (Esto no afecta los pedidos ni el inventario)")) return;
            try {
                const res = await API.deleteReporte(id);
                if (res.success) {
                    cargarHistorial();
                } else {
                    alert("Error: " + res.message);
                }
            } catch (e) { alert("Error al eliminar."); }
        }

        async function eliminarPedidoDesdeReporte(idReporte, idPedido) {
            if(!confirm("¿Eliminar este pedido del historial? Este cambio es administrativo y NO afectará el inventario actual de productos.")) return;

            try {
                // Notar el segundo parámetro 'false' para NO revertir stock
                const res = await API.deletePedido(idPedido, false);
                if(res.success) {
                    alert("Pedido eliminado y stock actualizado.");
                    // Actualizar UI local del reporte
                    const rep = historialGlobal.find(r => r.idReporte === idReporte);
                    if(rep) {
                        rep.pedidos = rep.pedidos.filter(px => px.id != idPedido);
                        rep.cantidadPedidos = rep.pedidos.length;
                        // Opcional: Recalcular totales del reporte si se desea (aquí solo refrescamos la vista)
                        verDetalleReporte(idReporte);
                        if(document.getElementById('modal-detalle-pedido').style.display === 'flex') {
                            cerrarPedidoModal();
                        }
                    }
                }
            } catch(e) { alert("Error al eliminar pedido."); }
        }

        async function obtenerHeaderEmpresa(cols) {
            let emp = { nombre: 'MI EMPRESA', nit: '', direccion: '', telefono: '', logoBase64: '' };
            try {
                const config = await API.getConfig();
                if (config && config.empresa) emp = { ...emp, ...config.empresa };
            } catch(e) {}
            
            let logoHtml = '';
            if (emp.logoBase64) {
                // Usamos cid:logo para que MHT lo reconozca
                // Reducimos tamaño para que encuadre perfectamente en 3 filas
                logoHtml = `<th rowspan="3" width="80" style="text-align:center; vertical-align:middle; background:white; border:1px solid #ccc; height:60px;"><img src="cid:logo" width="60" height="60" style="display:block; margin:auto;"></th>`;
                cols--;
            }

            const headerHtml = `
                <tr height="20">${logoHtml}<th colspan="${cols}" style="text-align:center; font-size:16px; height:20px;">${emp.nombre.toUpperCase()}</th></tr>
                <tr height="20"><th colspan="${cols}" style="text-align:center; font-size:12px; height:20px;">NIT: ${emp.nit} | TEL: ${emp.telefono}</th></tr>
                <tr height="20"><th colspan="${cols}" style="text-align:center; font-size:11px; border-bottom:2px solid #333; height:20px;">${emp.direccion}</th></tr>
            `;

            return { headerHtml, logoBase64: emp.logoBase64 };
        }

                <td colspan="10" align="right" style="${styleFooter} height: 45px; font-size: 15px; padding-right: 15px; background: #064e3b;">UTILIDAD NETA:</td>
                <td colspan="2" align="right" style="${styleFooter} color: #86efac; font-size: 16px; background: #064e3b;">$ ${Math.round(parseFloat(rep.gananciaRaw)).toLocaleString()}</td>
            </tr></table>`;

            API.descargarExcelMHT(tablaHtml, `Reporte_Historial_Simple_${rep.idReporte}`, logoBase64);
        }

        async function exportarPedidoIndividualExcel(p, simpleMode = false) {
            const totalCols = simpleMode ? 6 : 11;
            const { headerHtml, logoBase64 } = await obtenerHeaderEmpresa(totalCols);
            
            const titulo = simpleMode ? `RECIBO DE VENTA #${p.id} (COPIA)` : `COMPROBANTE DE PEDIDO #${p.id} (COPIA)`;
            const colBgc = simpleMode ? "#15803d" : "#0f172a";
            const colText = simpleMode ? "#ffffff" : "#00f2ff";

            let htmlPedido = `<table style="border-collapse: collapse;">
                ${headerHtml}
                <tr><th colspan="${totalCols}" style="background:${colBgc}; color:${colText}; height:40px; font-size:18px; border: .5pt solid #000000;">${titulo}</th></tr>
                <tr><th colspan="${totalCols}" style="background:#f8fafc; color:#334155; height:25px; border: .5pt solid #000000;">Cliente: ${p.cliente} | Fecha: ${p.fecha} ${p.hora}</th></tr>
                <tr style="font-weight: bold; text-align: center; background-color: #e2e8f0; color: #1e293b; height: 35px;">
                    <th style="border: .5pt solid #000000;">REF</th>
                    <th width="300" style="border: .5pt solid #000000;">PRODUCTO</th>
                    <th style="border: .5pt solid #000000;">UND</th>
                    <th style="border: .5pt solid #000000;">CANT</th>
                    <th width="120" style="border: .5pt solid #000000;">PRECIO UNIT.</th>
                    <th width="130" style="border: .5pt solid #000000;">${simpleMode ? 'TOTAL ITEM' : 'BASE UNIT.'}</th>`;
            
            if (!simpleMode) {
                htmlPedido += `
                    <th width="110" style="border: .5pt solid #000000;">IVA UNIT.</th>
                    <th width="110" style="border: .5pt solid #000000;">BASE TOTAL</th>
                    <th width="110" style="border: .5pt solid #000000;">IVA TOTAL</th>
                    <th width="120" style="border: .5pt solid #000000;">VENTA TOTAL</th>
                    <th width="120" style="border: .5pt solid #000000; color: #047857;">GANANCIA</th>`;
            }
            htmlPedido += `</tr>`;

            let tBase = 0, tIva = 0, tUtil = 0;
            p.items.forEach(item => {
                const pVenta = parseFloat(item.precioVenta || item.precio);
                const pCompra = parseFloat(item.precioCompra || 0);
                const cant = parseInt(item.cantidad);
                const perc = parseFloat(item.iva || 0);

                const bUnit = item.baseUnit !== undefined ? parseFloat(item.baseUnit) : Math.round(pVenta / (1 + (perc / 100)));
                const iUnit = item.ivaUnit !== undefined ? parseFloat(item.ivaUnit) : Math.round(pVenta - bUnit);
                const gTotal = item.gananciaTotal !== undefined ? parseFloat(item.gananciaTotal) : (pVenta - pCompra) * cant;

                tBase += (bUnit * cant);
                tIva += (iUnit * cant);
                tUtil += gTotal;

                if (simpleMode) {
                    htmlPedido += `<tr>
                        <td align="center" style="border: .5pt solid #000000; mso-number-format:'\\@';">'${item.referencia || item.codigo}</td>
                        <td style="border: .5pt solid #000000; padding: 5px;">${item.nombre}</td>
                        <td align="center" style="border: .5pt solid #000000;">${item.unidad || 'UND'}</td>
                        <td align="center" style="border: .5pt solid #000000;">${item.cantidad}</td>
                        <td align="right" style="border: .5pt solid #000000;">$ ${Math.round(pVenta).toLocaleString()}</td>
                        <td align="right" style="border: .5pt solid #000000; font-weight: bold; background: #f0f9ff;">$ ${Math.round(pVenta * cant).toLocaleString()}</td>
                    </tr>`;
                } else {
                    htmlPedido += `<tr>
                        <td align="center" style="border: .5pt solid #000000; mso-number-format:'\\@';">'${item.referencia || item.codigo}</td>
                        <td style="border: .5pt solid #000000; padding: 5px;">${item.nombre}</td>
                        <td align="center" style="border: .5pt solid #000000;">${item.unidad || 'UND'}</td>
                        <td align="center" style="border: .5pt solid #000000;">${item.cantidad}</td>
                        <td align="right" style="border: .5pt solid #000000; font-weight: bold;">$ ${Math.round(pVenta).toLocaleString()}</td>
                        <td align="right" style="border: .5pt solid #000000;">$ ${bUnit.toLocaleString()}</td>
                        <td align="right" style="border: .5pt solid #000000;">$ ${iUnit.toLocaleString()}</td>
                        <td align="right" style="border: .5pt solid #000000; background: #f8fafc;">$ ${Math.round(bUnit * cant).toLocaleString()}</td>
                        <td align="right" style="border: .5pt solid #000000; background: #f8fafc;">$ ${Math.round(iUnit * cant).toLocaleString()}</td>
                        <td align="right" style="border: .5pt solid #000000; font-weight: bold; background: #f0f9ff; color:#0369a1;">$ ${Math.round(pVenta * cant).toLocaleString()}</td>
                        <td align="right" style="border: .5pt solid #000000; color: #047857; background: #ecfdf5;">$ ${Math.round(gTotal).toLocaleString()}</td>
                    </tr>`;
                }
            });

            const styleFooter = `background-color: #0f172a; color: white; border: .5pt solid #000000; height: 35px; font-weight: bold;`;
            
            if (simpleMode) {
                htmlPedido += `
                <tr style="height:50px;">
                    <td colspan="4" align="right" style="${styleFooter} font-size: 16px; padding-right: 20px; background: #15803d;">TOTAL VENTA EN BRUTO:</td>
                    <td colspan="2" align="center" style="${styleFooter} font-size: 18px; color: #ffffff; background: #15803d;">$ ${Math.round(parseFloat(p.total)).toLocaleString()}</td>
                </tr></table>`;
            } else {
                htmlPedido += `
                <tr style="height:35px;">
                    <td colspan="9" align="right" style="${styleFooter} padding-right: 15px;">TOTAL BASE GRAVABLE:</td>
                    <td colspan="2" align="right" style="${styleFooter} color: #fdfd96;">$ ${Math.round(tBase).toLocaleString()}</td>
                </tr>
                <tr style="height:35px;">
                    <td colspan="9" align="right" style="${styleFooter} padding-right: 15px;">TOTAL IVA RECAUDADO:</td>
                    <td colspan="2" align="right" style="${styleFooter} color: #facc15;">$ ${Math.round(tIva).toLocaleString()}</td>
                </tr>
                <tr style="height:45px;">
                    <td colspan="9" align="right" style="${styleFooter} font-size: 16px; padding-right: 20px; background: #1e293b;">TOTAL VENTA EN BRUTO:</td>
                    <td colspan="2" align="center" style="${styleFooter} font-size: 18px; color: #00f2ff; background: #1e293b;">$ ${Math.round(parseFloat(p.total)).toLocaleString()}</td>
                </tr>
                <tr style="height:45px;">
                    <td colspan="9" align="right" style="${styleFooter} font-size: 16px; padding-right: 20px; background: #064e3b;">UTILIDAD NETA:</td>
                    <td colspan="2" align="center" style="${styleFooter} font-size: 18px; color: #a5f3fc; background: #064e3b;">$ ${Math.round(tUtil).toLocaleString()}</td>
                </tr></table>`;
            }
            
            API.descargarExcelMHT(htmlPedido, `Recibo_${p.id}_${simpleMode ? 'Simple' : 'Full'}`, logoBase64);
        }


        async function eliminarReporte(id) {
            if (confirm("¿Eliminar este reporte permanentemente?")) {
                try {
                    const res = await API.deleteReporte(id);
                    if(res.success) {
                        cargarHistorial();
                    }
                } catch(e) { alert("Error al eliminar"); }
            }
        }

        function cerrarModal() { document.getElementById('modal-detalle').style.display = 'none'; }
        function cerrarPedidoModal() { document.getElementById('modal-detalle-pedido').style.display = 'none'; }

        /* --- LOGICA ANALITICA --- */
        let analiticaOrden = 'desc';
        let analiticaMetrica = 'cant'; // 'cant' o 'utilidad'
        let datosAnalitica = [];

        function abrirAnalitica() {
            const fIn = document.getElementById('f-inicio').value;
            const fFi = document.getElementById('f-fin').value;
            const fAdmin = document.getElementById('f-admin').value.toLowerCase();

            const filtrado = historialGlobal.filter(rep => {
                const fRepo = API.getFechaLocal(Number(rep.idReporte));
                const coincideFecha = (!fIn || fRepo >= fIn) && (!fFi || fRepo <= fFi);
                const coincideAdmin = !fAdmin || (rep.admin && rep.admin.toLowerCase().includes(fAdmin));
                return coincideFecha && coincideAdmin;
            });

            const resumen = {};
            filtrado.forEach(rep => {
                rep.pedidos.forEach(ped => {
                    ped.items.forEach(it => {
                        const nombre = it.nombre || it.id;
                        const ref = it.referencia || it.codigo || "S/R";
                        const unidad = it.unidad || "";
                        const clave = nombre + "|" + ref + "|" + unidad;
                        const c = parseInt(it.cantidad || 0);
                        const u = parseFloat(it.gananciaTotal || 0);

                        if(!resumen[clave]) {
                            resumen[clave] = { nombre, referencia: ref, unidad, cant: 0, utilidad: 0 };
                        }
                        resumen[clave].cant += c;
                        resumen[clave].utilidad += u;
                    });
                });
            });

            datosAnalitica = Object.values(resumen);
            document.getElementById('modal-analitica').style.display = 'flex';
            renderizarAnalitica();
        }

        function cerrarAnalitica() {
            document.getElementById('modal-analitica').style.display = 'none';
        }

        function cambiarOrdenAnalitica(orden) {
            analiticaOrden = orden;
            actualizarBotonesAnalitica();
            renderizarAnalitica();
        }

        function setMetricaAnalitica(m) {
            analiticaMetrica = m;
            actualizarBotonesAnalitica();
            renderizarAnalitica();
        }

        function actualizarBotonesAnalitica() {
            const btnMas = document.getElementById('btn-top-mas');
            const btnMenos = document.getElementById('btn-top-menos');
            const btnMCant = document.getElementById('btn-metrica-cant');
            const btnMUtil = document.getElementById('btn-metrica-utilidad');

            btnMas.classList.toggle('active', analiticaOrden === 'desc');
            btnMenos.classList.toggle('active', analiticaOrden === 'asc');
            
            btnMCant.classList.toggle('active', analiticaMetrica === 'cant');
            btnMUtil.classList.toggle('active', analiticaMetrica === 'utilidad');
            
            if (analiticaMetrica === 'utilidad') {
                btnMas.innerText = "Mayor Utilidad";
                btnMenos.innerText = "Menor Utilidad";
                btnMUtil.style.background = "#10b981";
                btnMUtil.style.color = "white";
                btnMUtil.style.boxShadow = "0 0 15px rgba(16, 185, 129, 0.4)";
                
                btnMCant.style.background = "#1e293b";
                btnMCant.style.boxShadow = "none";
            } else {
                btnMas.innerText = "Más Vendidos";
                btnMenos.innerText = "Menos Vendidos";
                btnMCant.style.background = "#0ea5e9";
                btnMCant.style.color = "white";
                btnMCant.style.boxShadow = "0 0 15px rgba(14, 165, 233, 0.4)";
                
                btnMUtil.style.background = "#1e293b";
                btnMUtil.style.boxShadow = "none";
            }
        }

        function renderizarAnalitica() {
            const limite = parseInt(document.getElementById('analitica-limite').value) || 10;
            const container = document.getElementById('chart-container');
            
            // Cabecera de títulos
            container.innerHTML = `
                <div class="chart-row" style="margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; opacity: 0.6; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: bold; letter-spacing: 1px; color: var(--accent);">
                    <div style="width: 250px;">PRODUCTO / U.M.</div>
                    <div style="flex: 1; text-align: center;">${analiticaMetrica === 'cant' ? 'VALOR VENTAS (UNIDADES)' : 'PRODUCTIVIDAD (GANANCIA)'}</div>
                    <div style="width: 120px; text-align: right;">UTILIDAD TOTAL</div>
                </div>
            `;

            const sorted = [...datosAnalitica].sort((a,b) => {
                const valA = analiticaMetrica === 'cant' ? a.cant : a.utilidad;
                const valB = analiticaMetrica === 'cant' ? b.cant : b.utilidad;
                return analiticaOrden === 'desc' ? valB - valA : valA - valB;
            });

            const finalData = sorted.slice(0, limite);
            const maxVal = Math.max(...finalData.map(d => analiticaMetrica === 'cant' ? d.cant : d.utilidad), 1);

            // Paleta de colores profesionales con degradados
            const palette = [
                'linear-gradient(90deg, #0ea5e9, #22d3ee)', // Cian/Azul
                'linear-gradient(90deg, #8b5cf6, #a78bfa)', // Violeta
                'linear-gradient(90deg, #10b981, #34d399)', // Esmeralda
                'linear-gradient(90deg, #f59e0b, #fbbf24)', // Ambar
                'linear-gradient(90deg, #ec4899, #f472b6)', // Rosa
                'linear-gradient(90deg, #f43f5e, #fb7185)', // Rosa fuerte
                'linear-gradient(90deg, #6366f1, #818cf8)', // Indigo
                'linear-gradient(90deg, #ef4444, #f87171)', // Rojo
                'linear-gradient(90deg, #22c55e, #4ade80)', // Verde
                'linear-gradient(90deg, #3b82f6, #60a5fa)'  // Azul
            ];

            finalData.forEach((d, i) => {
                const currentVal = analiticaMetrica === 'cant' ? d.cant : d.utilidad;
                const perc = (currentVal / maxVal) * 100;
                const row = document.createElement('div');
                row.className = 'chart-row';
                const color = palette[i % palette.length];

                row.innerHTML = `
                    <div class="chart-label" style="width:250px; display:flex; justify-content:space-between; padding-right:15px;">
                        <span title="${d.nombre}" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${d.nombre}</span>
                        <span style="color:var(--accent); font-weight:bold; font-size:0.7rem; min-width:60px; text-align:right;">${d.unidad}</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-fill" style="width: 0%; background: ${color}; justify-content: flex-start; padding-left: 10px; padding-right: 0;">
                            <span class="bar-value" style="text-shadow: 0 1px 3px rgba(0,0,0,0.5);">
                                ${analiticaMetrica === 'cant' ? d.cant.toLocaleString() : '$' + Math.round(d.utilidad).toLocaleString()}
                            </span>
                        </div>
                    </div>
                    <div style="width: 120px; text-align: right; color: var(--profit); font-weight: bold; font-family: 'Orbitron', sans-serif; font-size: 0.85rem;">
                        $${Math.round(d.utilidad).toLocaleString()}
                    </div>
                `;
                container.appendChild(row);
                
                setTimeout(() => {
                    row.querySelector('.bar-fill').style.width = Math.max(perc, 15) + '%';
                }, 50);
            });

            if(finalData.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 60px; color: #94a3b8; font-family: 'Orbitron', sans-serif;">
                        <span style="font-size: 3rem; display: block; margin-bottom: 20px;">📉</span>
                        No hay datos de ventas disponibles en este rango de fechas.
                    </div>`;
            }
        }

        async function exportarAnaliticaExcel() {
            try {
                if(!datosAnalitica || datosAnalitica.length === 0) {
                    alert("No hay datos cargados para exportar. Por favor abre la analítica primero.");
                    return;
                }
                
                const limite = parseInt(document.getElementById('analitica-limite').value) || 10;
                const sorted = [...datosAnalitica].sort((a,b) => {
                    const valA = analiticaMetrica === 'cant' ? a.cant : a.utilidad;
                    const valB = analiticaMetrica === 'cant' ? b.cant : b.utilidad;
                    return analiticaOrden === 'desc' ? valB - valA : valA - valB;
                });
                const finalData = sorted.slice(0, limite);
                
                const fIn = document.getElementById('f-inicio').value || 'inicio';
                const fFi = document.getElementById('f-fin').value || 'fin';
                
                // Configuración según métrica
                const esModoUtilidad = (analiticaMetrica === 'utilidad');
                const tituloReporte = esModoUtilidad ? `RANKING DE RENTABILIDAD (MAYOR UTILIDAD)` : `RANKING DE MOVIMIENTO (MAYOR CANTIDAD)`;
                const nombreArchivo = esModoUtilidad ? `Analitica_Utilidad_${fIn}_al_${fFi}` : `Analitica_Cantidades_${fIn}_al_${fFi}`;

                // Obtener encabezado correctamente (desestructurado) para 6 columnas
                let headerHtml = "";
                let logoBase64 = "";
                try {
                    const headerData = await obtenerHeaderEmpresa(6);
                    headerHtml = headerData.headerHtml;
                    logoBase64 = headerData.logoBase64;
                } catch(e) { console.error("Error en header:", e); }

                let tableHtml = `
                    <table border="1">
                        ${headerHtml}
                        <tr><th colspan="6" style="background:#05060f; color:#0ea5e9; height:40px; font-size:18px;">${tituloReporte}</th></tr>
                        <tr><th colspan="6" style="background:#f8fafc; color:#334155; height:25px;">Periodo: del ${fIn} al ${fFi}</th></tr>
                        <tr style="color:white; font-weight:bold; height:30px;">
                            <th width="60" style="background:#1e293b;">POS</th>
                            <th width="120" style="background:#1e293b;">REFERENCIA</th>
                            <th width="350" style="background:#1e293b;">PRODUCTO</th>
                            <th width="100" style="background:#1e293b;">U.M.</th>
                            <th width="130" style="background:${!esModoUtilidad ? '#0891b2' : '#1e293b'};">CANT. VENDIDA</th>
                            <th width="150" style="background:${esModoUtilidad ? '#10b981' : '#1e293b'};">UTILIDAD TOTAL</th>
                        </tr>
                `;

                finalData.forEach((d, i) => {
                    tableHtml += `
                        <tr>
                            <td align="center">${i + 1}</td>
                            <td style="mso-number-format:'\\@'; padding-left:5px;">'${d.referencia}</td>
                            <td style="padding-left:5px;">${d.nombre}</td>
                            <td align="center">${d.unidad}</td>
                            <td align="center" style="${!esModoUtilidad ? 'background:#f0f9ff; font-weight:bold;' : ''}">${d.cant.toLocaleString()}</td>
                            <td align="right" style="padding-right:5px; ${esModoUtilidad ? 'background:#f0fdf4; font-weight:bold;' : ''}">$${Math.round(d.utilidad).toLocaleString()}</td>
                        </tr>`;
                });

                tableHtml += `</table>`;

                API.descargarExcelMHT(tableHtml, nombreArchivo, logoBase64);
            } catch (err) {
                alert("Error técnico en exportación: " + err.message);
            }
        }

        function inicializarFechas() {
            const hoy = new Date();
            const hace30dias = new Date();
            hace30dias.setDate(hoy.getDate() - 30);
            
            if(document.getElementById('f-inicio')) document.getElementById('f-inicio').value = API.getFechaLocal(hace30dias);
            if(document.getElementById('f-fin')) document.getElementById('f-fin').value = API.getFechaLocal(hoy);
        }

        window.onload = () => {
            inicializarFechas();
            cargarHistorial();
        };
    </script>
