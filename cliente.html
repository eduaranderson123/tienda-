<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if(!localStorage.getItem('userLogin')) {
            window.location.href = 'login.html';
        }
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pedidos - Premium Experience</title>
    <script src="api.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.4);
            --whatsapp: #22c55e; 
            --bg: #030712; 
            --card-bg: rgba(31, 41, 55, 0.3);
            --header-dark: #0f172a; 
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --confirm: #8b5cf6; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --ticket: #f59e0b;
            --print: #ec4899;
            --shadow-lux: 0 10px 40px rgba(0,0,0,0.6);
        }

        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap');

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            min-width: 250px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            pointer-events: auto;
        }
        .toast.success { border-left-color: var(--whatsapp); border-left-width: 6px; }
        .toast.error { border-left-color: #ef4444; border-left-width: 6px; }
        .toast.warning { border-left-color: var(--ticket); border-left-width: 6px; }
        
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        /* --- MODAL CONFIRM --- */
        #modalConfirm {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10001; /* Mayor que otros modales */
            justify-content: center;
            align-items: center;
            pointer-events: none; 
        }
        #modalConfirm[style*="flex"] { pointer-events: auto; }
        .confirm-content {
            background: var(--header-dark);
            border: 1px solid var(--primary);
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px var(--primary-glow);
            animation: zoomIn 0.3s ease;
        }
        .confirm-content h3 { font-family: 'Orbitron', sans-serif; margin-bottom: 15px; color: white; font-size: 1rem; }
        .confirm-content p { color: var(--text-muted); margin-bottom: 25px; font-size: 0.85rem; }
        .confirm-btns { display: flex; gap: 12px; justify-content: center; }
        .btn-confirm { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.7rem; }
        .btn-yes { background: var(--primary); color: white; flex: 1; }
        .btn-no { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); flex: 1; }
        .btn-yes:hover { filter: brightness(1.2); transform: scale(1.05); }
        .btn-no:hover { background: rgba(255,255,255,0.1); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        header { 
            background: rgba(2, 6, 23, 0.82); 
            backdrop-filter: blur(20px);
            color: white; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); 
            z-index: 100;
        }

        header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .cart-status { 
            font-weight: 700; 
            background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--accent);
            padding: 6px 16px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            color: var(--accent);
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .btn-logout { 
            background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 16px; 
            border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-logout:hover { background: #ef4444; color: white; }

        .container { flex: 1; padding: 25px; overflow-y: auto; z-index: 10; scroll-behavior: smooth; }
        
        .controls { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .search-row { display: flex; gap: 10px; margin-bottom: 10px; }

        .search-bar { 
            flex: 1; padding: 8px; 
            background: #0f172a;
            border: 1px solid #334155; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            color: white;
            outline: none; 
            box-sizing: border-box; 
        }

        .view-btn {
            background: #334155; border: 1px solid var(--accent); color: var(--accent);
            padding: 0 15px; border-radius: 8px; cursor: pointer; font-size: 1.2rem;
        }

        .category-btns { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .cat-btn { 
            background: #334155; border: none; padding: 6px 12px; border-radius: 15px; 
            cursor: pointer; white-space: nowrap; font-size: 0.75rem; color: #cbd5e1; 
        }
        .search-row { display: flex; gap: 15px; margin-bottom: 15px; }

        .search-bar { 
            flex: 1; padding: 14px 20px; 
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border); 
            border-radius: 12px; 
            font-size: 1rem; 
            color: white;
            outline: none; 
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .view-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted);
            padding: 0 18px; border-radius: 12px; cursor: pointer; font-size: 1.1rem;
            transition: 0.3s;
        }
        .view-btn:hover, .view-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .category-btns { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .category-btns::-webkit-scrollbar { height: 4px; }
        .category-btns::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .cat-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; 
            cursor: pointer; white-space: nowrap; font-size: 0.75rem; color: var(--text-muted); 
            transition: 0.3s; font-weight: 600;
        }
        .cat-btn:hover { border-color: var(--accent); color: white; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* MODOS DE VISTA */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; }
        
        .list { display: flex; flex-direction: column; gap: 12px; }
        .list .card { flex-direction: row; height: 85px; align-items: center; }
        .list .card img { width: 85px; height: 85px; border-bottom: none; border-right: 1px solid var(--border); }
        .list .info { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 20px; }
        .list .info h3 { height: auto; white-space: nowrap; width: 180px; font-size: 0.8rem; }
        .list .order-zone { border-top: none; border-left: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 10px; }
        .list .qty-box { margin-bottom: 0; }

        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            display: flex; flex-direction: column; 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
            position: relative;
        }
        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
        }
        .card img { 
            width: 100%; height: 130px; 
            object-fit: cover; cursor: zoom-in; opacity: 0.85; 
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s; 
        }
        .card:hover img { 
            opacity: 1; 
            transform: scale(1.1); 
        }

        .info { padding: 12px; flex: 1; }
        .info h3 { margin: 0; font-size: 0.82rem; color: var(--text-main); height: 36px; overflow: hidden; line-height: 1.2; font-weight: 600; }
        .price { font-size: 1.15rem; color: var(--accent); font-weight: 800; margin: 8px 0; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px var(--accent-glow); }
        .unit-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .badge-unit { background: var(--primary); color: white; font-size: 0.65rem; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-top: 5px; font-weight: 700; }
        .ref-label { font-size: 0.65rem; background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 6px; color: var(--text-muted); border: 1px solid var(--border); }
        
        .stock-label { font-size: 0.75rem; font-weight: 800; display: block; margin-top: 10px; text-transform: uppercase; }
        .stock-high { color: var(--whatsapp); }
        .stock-low { color: #facc15; animation: pulse 1.5s infinite; }
        .stock-none { color: #ef4444; }

        .stock-badge {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 5px;
            border: 1px solid;
        }
        .stock-badge.stock-high { background: rgba(34, 197, 94, 0.1); border-color: var(--whatsapp); }
        .stock-badge.stock-low { background: rgba(250, 204, 21, 0.1); border-color: #facc15; }
        .stock-badge.stock-none { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .card.out-of-stock { filter: grayscale(0.5); border-color: rgba(239, 68, 68, 0.2); }

        .order-zone { padding: 15px; background: rgba(0,0,0,0.25); border-top: 1px solid var(--border); }
        .qty-box { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 0.8rem; }
        .qty-input { 
            width: 55px; padding: 8px; 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            border-radius: 8px; text-align: center; color: white; font-size: 1rem; font-weight: 700;
        }
        .btn-add { 
            width: 100%; background: linear-gradient(135deg, var(--primary), #4338ca); color: white; border: none; padding: 14px; 
            border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Orbitron', sans-serif;
            box-shadow: 0 4px 15px var(--primary-glow);
            position: relative; overflow: hidden;
        }
        .btn-add::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255,255,255,0.1); transform: rotate(45deg) translate(-100%, -100%);
            transition: 0.6s;
        }
        .btn-add:hover { transform: translateY(-3px); filter: brightness(1.15); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-add:hover::after { transform: rotate(45deg) translate(100%, 100%); }
        .btn-add:active { transform: translateY(-1px) scale(0.98); }

        /* --- MINI CARRITO ABAJO --- */
        .resumen-seccion { background: #05060f; border-top: 1px solid var(--accent); max-height: 150px; overflow-y: auto; backdrop-filter: blur(20px); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        thead { background: rgba(0, 242, 255, 0.03); color: var(--accent); position: sticky; top: 0; }
        th, td { padding: 8px 15px; border-bottom: 1px solid var(--border); text-align: left; }
        
        .edit-qty-table, .edit-price-table {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: white;
            padding: 5px; border-radius: 8px; width: 70px; text-align: center; font-weight: 700;
        }
        .edit-price-table { width: 100px; color: var(--accent); }
        .edit-price-table[readonly] { border: none; background: transparent; pointer-events: none; }

        .footer-actions { 
            padding: 20px 30px; 
            background: var(--header-dark); 
            border-top: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            backdrop-filter: blur(20px);
        }
        .total-container { font-size: 1.4rem; font-weight: 800; color: var(--accent); font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px var(--accent-glow); }
        .action-btns { display: flex; gap: 12px; }
        
        .btn-reset { background: transparent; color: #f87171; border: 1px solid #ef4444; padding: 10px 15px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; font-weight: 700; }
        .btn-reset:hover { background: #ef4444; color: white; }

        .btn-confirm, .btn-bill, .btn-send, .btn-ticket, .btn-print { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: 0.3s; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
        .btn-confirm { background: var(--confirm); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-bill { background: var(--bill); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-send { background: var(--whatsapp); color: white; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn-ticket { background: var(--ticket); color: white; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .btn-print { background: var(--print); color: white; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
        
        button:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

        .modal { 
            display: none; 
            position: fixed; 
            z-index: 10000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        #imgGrande {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-form {
            background: #0a0b14;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
        }
        .modal-form h3 { margin-top: 0; color: var(--accent); font-family: 'Orbitron', sans-serif; letter-spacing: 1px; font-size: 1.2rem; }
        .modal-form input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .modal-form input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .modal-form .form-btns { display: flex; gap: 15px; margin-top: 25px; }
        .modal-form button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        
        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
            .main { padding: 20px; overflow-y: visible; }
            .header-controls { padding: 20px; margin: -20px -20px 20px -20px; position: relative; }
            .cart-panel { position: relative; height: auto; width: 100%; border-left: none; border-top: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
            .grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }

        #ticket-print-area { display: none; }
        
        .btn-dian { background: #0f172a; color: #00f2ff; border: 1px solid #00f2ff; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2); }
        .btn-dian:hover { background: #00f2ff; color: #000; }

        @page { size: auto; margin: 0; } /* ELIMINA ENCABEZADOS Y PIE DE PÁGINA DEL NAVEGADOR */

        @media print {
            body { background: white !important; color: black !important; }
            header, .container, .resumen-seccion, .footer-actions, .modal, #toast-container { display: none !important; }
            
            #ticket-print-area { 
                display: block !important; 
                position: absolute; 
                top: 0; left: 0; 
                width: 75mm; /* Ajustado para impresora térmica estándar */
                padding: 10px;
                color: black;
                font-family: 'Courier New', Courier, monospace;
            }
        }
    </style>
</head>
<body>

<div id="modalConfirm">
    <div class="confirm-content">
        <h3 id="confirm-title">¿ESTÁS SEGURO?</h3>
        <p id="confirm-msg">Esta acción no se puede deshacer.</p>
        <div class="confirm-btns">
            <button id="confirm-btn-yes" class="btn-confirm btn-yes">SÍ, CONTINUAR</button>
            <button onclick="cerrarConfirmacion()" class="btn-confirm btn-no">CANCELAR</button>
        </div>
    </div>
</div>

<div id="modalZoom" class="modal" onclick="this.style.display='none'">
    <img id="imgGrande" class="modal-content">
</div>

<div id="modalTicket" class="modal">
    <div class="modal-form">
        <h3>🎫 Ticket WhatsApp</h3>
        <label style="font-size: 0.8rem;">Nombre del Cliente:</label>
        <input type="text" id="tk-nombre" placeholder="Ej: Juan Pérez" onkeyup="if(event.key==='Enter'){procesarTicketTxt()}">
        <label style="font-size: 0.8rem;">Celular de Envío:</label>
        <input type="number" id="tk-celular" placeholder="321512xxxx" onkeyup="if(event.key==='Enter'){procesarTicketTxt()}">
        <div class="form-btns">
            <button onclick="cerrarModalTicket()" style="background: #475569; color: white;">Cancelar</button>
            <button onclick="procesarTicketTxt()" style="background: var(--ticket); color: white;">Enviar Ticket</button>
        </div>
    </div>
</div>

<div id="modalPrint" class="modal">
    <div class="modal-form" style="border: 1px solid var(--print); box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);">
        <h3 style="color: var(--print); display: flex; align-items: center; gap: 10px;">
            <span>🖨️</span> Imprimir Ticket
        </h3>
        <div style="margin-bottom: 20px;">
            <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Nombre Cliente:</label>
            <input type="text" id="print-nombre" placeholder="Nombre para el ticket" style="border-radius: 10px; margin-top: 5px;" onkeyup="if(event.key==='Enter'){ejecutarImpresionFinal(document.querySelector('button[onclick*=\'ejecutarImpresionFinal\']'))}">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Celular (Opcional):</label>
            <input type="number" id="print-celular" placeholder="Celular para el ticket" style="border-radius: 10px; margin-top: 5px;" onkeyup="if(event.key==='Enter'){ejecutarImpresionFinal(document.querySelector('button[onclick*=\'ejecutarImpresionFinal\']'))}">
        </div>
        <div class="form-btns">
            <button onclick="cerrarModalPrint()" style="background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border);">CANCELAR</button>
            <button onclick="ejecutarImpresionFinal(this)" style="background: var(--print); color: white; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);">IMPRIMIR</button>
        </div>
    </div>
</div>

<div id="modalPago" class="modal">
    <div class="modal-form" style="max-width: 450px; border: 1px solid var(--accent); box-shadow: 0 0 30px var(--accent-glow);">
        <h3 style="color: var(--accent); text-align: center; margin-bottom: 25px;">🧮 DETALLE Y PAGO</h3>
        
        <div id="pago-detalle-items" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 10px;">
            <!-- Se llena dinámicamente -->
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-size: 1rem; font-weight: 700;">TOTAL A PAGAR:</span>
            <span id="pago-total" style="font-size: 1.5rem; color: var(--accent); font-family: 'Orbitron', sans-serif;">$ 0</span>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">DINERO RECIBIDO:</label>
            <input type="number" id="pago-recibido" placeholder="0" style="font-size: 1.5rem; text-align: center; color: var(--accent); border-color: var(--accent);" onkeyup="if(event.key==='Enter'){guardarPedidoFinal()}else{calcularCambio()}">
        </div>

        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: center; border: 1px dashed var(--border);">
            <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px;">EL CAMBIO ES:</div>
            <div id="pago-cambio" style="font-size: 1.8rem; color: #22c55e; font-family: 'Orbitron', sans-serif; font-weight: 700;">$ 0</div>
        </div>

        <div class="form-btns">
            <button onclick="cerrarModalPago()" style="background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border);">CANCELAR</button>
            <button onclick="guardarPedidoFinal()" style="background: var(--whatsapp); color: white; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);">GUARDAR PEDIDO</button>
        </div>
    </div>
</div>

<div id="ticket-print-area"></div>

<header>
    <h2 id="titulo-saludo" style="font-size: 1rem; margin:0;">👋 Hola...</h2>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div class="cart-status">Items: <span id="cart-count">0</span></div>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
</header>

<div class="container">
    <div class="controls">
        <div class="search-row" style="gap:10px;">
            <input type="text" id="buscador" class="search-bar" placeholder="🔍 F1: Buscar Producto o Referencia..." onkeyup="render()" onkeydown="handleSearchKey(event)" autofocus style="flex:2;">
            <button class="view-btn" onclick="toggleView()" id="btn-vista">🔲</button>
        </div>
        <div id="categorias" class="category-btns"></div>
    </div>
    <div id="lista" class="grid"></div>
</div>

<div class="resumen-seccion">
    <table>
        <thead>
            <tr>
                <th>REF</th>
                <th>Producto</th>
                <th>UND</th>
                <th>Precio Unit.</th>
                <th style="width: 50px;">Cant.</th>
                <th>Base</th>
                <th>IVA</th>
                <th>Subtotal</th>
                <th style="width: 35px;"></th>
            </tr>
        </thead>
        <tbody id="items-tabla"></tbody>
    </table>
</div>

<div class="footer-actions">
    <div class="total-container">
        <div style="font-size: 0.8rem; opacity: 0.8;">Base: <span id="total-base">$ 0</span> | IVA: <span id="total-iva">$ 0</span></div>
        TOTAL: <span id="total-dinero">$ 0</span>
    </div>
    <div class="action-btns">
        <button class="btn-reset" onclick="reiniciarPedido()" style="background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid var(--border);" title="Atajo: F3">🔄 Limpiar [F3]</button>
        <button id="btn-confirmar" class="btn-confirm" onclick="abrirModalPago()" style="background: var(--confirm); color: white; box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);" title="Atajo: F2">💾 Confirmar [F2] </button>
        <button id="btn-bill" class="btn-bill" onclick="generarFacturaExcel()" style="background: #10b981; color: white;" disabled>📊 Excel</button>
        <button id="btn-dian" class="btn-dian" onclick="reportarDIAN()" style="background: #0f172a; color: #00f2ff; border: 1px solid #00f2ff; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2);" disabled title="Atajo: F11">⚡ DIAN [F11]</button>
        <button id="btn-print" class="btn-print" onclick="abrirModalPrint()" style="background: var(--print); color: white;" disabled title="Atajo: F4">🖨️ Imprimir [F4]</button>
        <button id="btn-ticket" class="btn-ticket" onclick="abrirModalTicket()" style="background: var(--ticket); color: white;" disabled title="Atajo: F5">🎫 Ticket [F5]</button>
        <button id="btn-send" class="btn-send" onclick="enviarPedido()" style="background: var(--whatsapp); color: white;" disabled title="Atajo: F6">✅ WhatsApp [F6]</button>
        
        <!-- Botones DIAN Post-Reporte (Ocultos inicialmente) -->
        <div id="dian-outputs" style="display: none; align-items: center; gap: 10px;">
            <button id="btn-dian-pdf" class="btn-circle" onclick="generarPDFDIAN()" style="background: #ef4444; color: white;" title="Ver PDF Factura">📄 PDF</button>
            <button id="btn-dian-xml" class="btn-circle" onclick="descargarXMLDIAN()" style="background: #f59e0b; color: white;" title="Descargar XML DIAN">📂 XML</button>
        </div>
    </div>
</div>


    <script>
        let productos = [];
        let config = { categorias: [], empresa: {} };
        let carrito = {}; 
        let categoriaActual = 'Todas';
        let idPedidoActual = null;
        let puedeEditarPrecio = false;
        let vistaActual = 'grid';

        function toggleView() {
            const lista = document.getElementById('lista');
            const btn = document.getElementById('btn-vista');
            if (vistaActual === 'grid') {
                vistaActual = 'list';
                lista.classList.remove('grid');
                lista.classList.add('list');
                btn.innerText = '☰';
                btn.classList.add('active');
            } else {
                vistaActual = 'grid';
                lista.classList.remove('list');
                lista.classList.add('grid');
                btn.innerText = '🔲';
                btn.classList.remove('active');
            }
        }

        // Persistencia del carrito
        function guardarCarrito() {
            localStorage.setItem('carrito_pro_ventas', JSON.stringify(carrito));
            if(idPedidoActual) localStorage.setItem('id_pedido_temp', idPedidoActual);
        }

        function cargarCarrito() {
            const s = localStorage.getItem('carrito_pro_ventas');
            const id = localStorage.getItem('id_pedido_temp');
            if(id) idPedidoActual = id;
            if(s) {
                try { 
                    carrito = JSON.parse(s); 
                    actualizarTabla(); 
                    // Foco automático al buscador tras cargar
                    setTimeout(() => document.getElementById('buscador').focus(), 500);
                    if(idPedidoActual) {
                        const btns = ['btn-bill', 'btn-send', 'btn-ticket', 'btn-print', 'btn-dian'];
                        btns.forEach(b => {
                            const el = document.getElementById(b);
                            if(el) el.disabled = false;
                        });
                        const btnConf = document.getElementById('btn-confirmar');
                        if(btnConf) {
                            btnConf.disabled = true;
                            btnConf.innerText = "Guardado";
                        }
                    }
                } catch(e) { console.error("Error cargando carrito", e); }
            }
        }

        const clienteLogueado = localStorage.getItem('nombreCliente') || "Cliente";
        document.getElementById('titulo-saludo').innerText = `👋 Hola, ${clienteLogueado}`;

        async function validarPermisos() {
            try {
                const canEdit = localStorage.getItem('canEditPrice') === 'true';
                puedeEditarPrecio = canEdit;
                const rol = localStorage.getItem('userRol');
                if (rol !== 'admin') {
                    const check = (id, key) => {
                        if (localStorage.getItem(key) === 'false') {
                            const el = document.getElementById(id);
                            if(el) el.style.display = 'none';
                        }
                    };
                    check('btn-bill', 'permExcel');
                    check('btn-print', 'permPrint');
                    check('btn-ticket', 'permTicket');
                    check('btn-send', 'permWA');
                    check('btn-dian', 'permDian');
                }
            } catch (e) { console.error("Error validando permisos", e); }
        }

        function showToast(msg, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div>${type === 'success' ? '✅' : 'ℹ️'}</div> <div>${msg}</div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.4s ease forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        async function cargarData() {
            try {
                productos = await API.getProductos();
                config = await API.getConfig();
                if(config.empresa && config.empresa.tema) {
                    API.applyTheme(config.empresa.tema);
                }
                
                const container = document.getElementById('categorias');
                let html = `<button class="cat-btn ${categoriaActual === 'Todas' ? 'active' : ''}" onclick="filtrar('Todas')">Todas</button>`;
                (config.categorias || []).forEach(cat => {
                    html += `<button class="cat-btn ${categoriaActual === cat ? 'active' : ''}" onclick="filtrar('${cat}')">${cat}</button>`;
                });
                container.innerHTML = html;
                render();
            } catch (error) {
                showToast("Error de conexión", "error");
            }
        }

        function handleSearchKey(e) {
            if (e.key === 'Enter') {
                const query = document.getElementById('buscador').value.toLowerCase().trim();
                if (!query) return;
                
                // Buscar primero por código exacto
                let p = productos.find(x => x.codigo.toLowerCase() === query);
                
                // Si no, buscar por nombre o coincidencia parcial
                if (!p) {
                    p = productos.find(x => 
                        x.nombre.toLowerCase().includes(query) || 
                        x.codigo.toLowerCase().includes(query)
                    );
                }

                if (p) {
                    const stock = parseInt(p.existencia) || 0;
                    if (stock > 0) {
                        agregarAlCarrito(p.codigo, p.nombre, p.precio, p.unidad);
                    } else {
                        showToast("Producto sin stock", "warning");
                    }
                    document.getElementById('buscador').value = '';
                    render();
                }
            }
        }

        function render() {
            const query = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => {
                const mB = (p.nombre || "").toLowerCase().includes(query) || (p.codigo || "").toLowerCase().includes(query);
                const mC = categoriaActual === 'Todas' || p.categoria === categoriaActual;
                return mB && mC;
            });

            document.getElementById('lista').innerHTML = filtrados.map(p => {
                const stock = parseInt(p.existencia) || 0;
                let statusClass = stock <= 0 ? 'stock-none' : (stock < 5 ? 'stock-low' : 'stock-high');
                return `
                    <div class="card ${stock <= 0 ? 'out-of-stock' : ''}">
                        <img src="${API.fixImage(p.imagen)}" onclick="abrirZoom(this.src)" onerror="this.src=API.DEFAULT_IMAGE">
                        <div class="info">
                            <span class="ref-label">REF: ${p.codigo}</span>
                            <h3>${API.formatProductName(p.nombre, p.unidad)}</h3>
                            <div class="price">$${Math.round(parseFloat(p.precio || 0)).toLocaleString()}</div>
                            <span class="stock-badge ${statusClass}">${stock <= 0 ? 'Agotado' : 'Stock: ' + stock}</span>
                        </div>
                        <div class="order-zone">
                            <input type="number" id="qty-${p.codigo}" class="qty-input" value="1" min="1" ${stock <= 0 ? 'disabled' : ''}>
                            <button class="btn-add" onclick="agregarAlCarrito('${p.codigo}', '${p.nombre}', ${p.precio}, '${p.unidad}')" ${stock <= 0 ? 'disabled' : ''}>Añadir</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function agregarAlCarrito(ref, nom, pre, uni) {
            const qtyInput = document.getElementById(`qty-${ref}`);
            const cant = qtyInput ? parseInt(qtyInput.value) : 1;
            const p = productos.find(x => x.codigo === ref);
            const stock = p ? (parseInt(p.existencia) || 0) : 0;
            const yaEn = carrito[ref] ? carrito[ref].cantidad : 0;

            if (stock < (yaEn + cant)) return showToast("Stock insuficiente", "warning");

            if (carrito[ref]) carrito[ref].cantidad += cant;
            else carrito[ref] = { nombre: nom, precio: pre, cantidad: cant, referencia: ref, unidad: uni };
            
            actualizarTabla();
            showToast("Añadido", "success");
        }

        function actualizarTabla() {
            const tbody = document.getElementById('items-tabla');
            let total = 0; let totalBase = 0; let totalIva = 0; let count = 0; let html = "";
            const modoIva = (config.empresa && config.empresa.ivaModo) || 'incluido';

            for (let ref in carrito) {
                const item = carrito[ref];
                const pInfo = productos.find(x => x.codigo === ref) || {};
                const perc = pInfo.ivaPorcentaje || 0;
                const calc = API.calcularIVA(item.precio * item.cantidad, perc, modoIva);

                total += calc.total;
                totalBase += calc.base;
                totalIva += calc.iva;
                count += item.cantidad;

                html += `
                    <tr>
                        <td>${ref}</td>
                        <td style="font-weight: 500;">${item.nombre}</td>
                        <td style="color: var(--text-muted);">${item.unidad || 'Und'}</td>
                        <td><input type="number" value="${item.precio}" ${puedeEditarPrecio ? '' : 'readonly'} onchange="editarPrecio('${ref}', this.value)"></td>
                        <td><input type="number" value="${item.cantidad}" class="cart-qty-input" data-ref="${ref}" onchange="editarCant('${ref}', this.value)"></td>
                        <td style="font-size: 0.85rem; opacity: 0.9;">$${API.formatNumber(calc.base)}</td>
                        <td style="font-size: 0.85rem; opacity: 0.9; color: var(--accent);">$${API.formatNumber(calc.iva)}</td>
                        <td style="font-weight:bold">$${API.formatNumber(calc.total)}</td>
                        <td><button onclick="eliminarItem('${ref}')">✕</button></td>
                    </tr>
                `;
            }
            tbody.innerHTML = html || '<tr><td colspan="8" style="text-align:center">Carrito vacío</td></tr>';
            document.getElementById('total-dinero').innerText = `$ ${API.formatNumber(total)}`;
            document.getElementById('total-base').innerText = `$ ${API.formatNumber(totalBase)}`;
            document.getElementById('total-iva').innerText = `$ ${API.formatNumber(totalIva)}`;
            document.getElementById('cart-count').innerText = count;
            guardarCarrito();
        }

        function editarCant(ref, val) {
            const n = parseInt(val);
            if (n <= 0) return eliminarItem(ref);
            
            const p = productos.find(x => x.codigo === ref);
            const stock = p ? (parseInt(p.existencia) || 0) : 0;
            
            if (n > stock) {
                showToast(`Solo hay ${stock} en stock`, "warning");
                carrito[ref].cantidad = stock;
            } else {
                carrito[ref].cantidad = n;
            }
            actualizarTabla();
        }

        function editarPrecio(ref, val) {
            const n = parseFloat(val);
            if (n >= 0) carrito[ref].precio = n;
            actualizarTabla();
        }

        function eliminarItem(ref) {
            delete carrito[ref];
            actualizarTabla();
        }

        async function guardarPedidoFinal() {
            if (window._isSaving) return;
            window._isSaving = true;
            const btnConf = document.getElementById('btn-confirmar');
            if (btnConf) {
                btnConf.disabled = true;
                btnConf.innerText = "⏳ Procesando...";
            }

            // SINCRONIZAR CANTIDADES MANUALES (Por si no se disparó onchange)
            const inputs = document.querySelectorAll('.cart-qty-input');
            inputs.forEach(inp => {
                const ref = inp.getAttribute('data-ref');
                const val = parseInt(inp.value) || 0;
                if (carrito[ref]) {
                    // Validamos aquí también para corregir antes de procesar
                    const p = productos.find(x => x.codigo === ref);
                    const stock = p ? (parseInt(p.existencia) || 0) : 0;
                    if (val > stock) {
                        carrito[ref].cantidad = stock;
                    } else if (val > 0) {
                        carrito[ref].cantidad = val;
                    }
                }
            });
            actualizarTabla();

            const totalText = document.getElementById('total-dinero').innerText.replace(/[^\d]/g, "");
            const total = parseFloat(totalText);
            
            if (total <= 0) {
                window._isSaving = false;
                if (btnConf) {
                    btnConf.disabled = false;
                    btnConf.innerText = "💾 Confirmar [F2]";
                }
                return showToast("Carrito vacío", "warning");
            }

            // VALIDACIÓN FINAL DE STOCK
            for (let ref in carrito) {
                const item = carrito[ref];
                const prod = productos.find(x => x.codigo === ref);
                const stockVal = prod ? (parseInt(prod.existencia) || 0) : 0;
                if (item.cantidad > stockVal) {
                    window._isSaving = false;
                    if (btnConf) {
                        btnConf.disabled = false;
                        btnConf.innerText = "💾 Confirmar [F2]";
                    }
                    return showToast(`Stock insuficiente para ${item.nombre}: ${stockVal} disp.`, "error");
                }
            }

            const itemsFinales = Object.values(carrito).map(it => {
                const prod = productos.find(x => x.codigo === it.referencia) || {};
                return {
                    ...it,
                    iva: prod.ivaPorcentaje || 0,
                    precioCompra: prod.precioCompra || 0 // Capturamos el costo actual para auditoría
                };
            });

            const bT = parseFloat(document.getElementById('total-base').innerText.replace(/[^\d]/g, "")) || 0;
            const iT = parseFloat(document.getElementById('total-iva').innerText.replace(/[^\d]/g, "")) || 0;

            // --- IDENTIDAD INMUTABLE DE PEDIDO ---
            // Buscamos si ya existe un ID para este pedido en curso (por si hubo un refresco o reintento)
            let idPersistente = localStorage.getItem('id_pedido_temp');
            if (!idPersistente) {
                idPersistente = Date.now();
                localStorage.setItem('id_pedido_temp', idPersistente);
            }

            const pedido = {
                id: Number(idPersistente),
                cliente: (localStorage.getItem('nombreCliente') || "Cliente").toUpperCase(),
                items: itemsFinales,
                total: total,
                baseTotal: bT,
                ivaTotal: iT,
                fecha: API.getFechaLocal(),
                hora: new Date().toLocaleTimeString(),
                moverStock: true // EXPLICIT: Ordenamos al servidor mover el inventario
            };

            try {
                const res = await API.savePedido(pedido);
                if (res.success) {
                    idPedidoActual = pedido.id;
                    guardarCarrito();
                    showToast("Venta guardada", "success");
                    
                    if (btnConf) {
                        btnConf.disabled = true;
                        btnConf.innerText = "Guardado";
                    }

                    const mapping = {
                        'btn-bill': 'permExcel',
                        'btn-print': 'permPrint',
                        'btn-ticket': 'permTicket',
                        'btn-send': 'permWA',
                        'btn-dian': 'permDian'
                    };

                    Object.keys(mapping).forEach(id => {
                        const el = document.getElementById(id);
                        if(el) {
                            const permKey = mapping[id];
                            if (localStorage.getItem('userRol') !== 'admin' && localStorage.getItem(permKey) === 'false') {
                                el.style.display = 'none';
                            } else {
                                el.disabled = false;
                                el.style.display = 'block';
                            }
                        }
                    });
                    cerrarModalPago();
                    cargarData();
                }
            } catch (error) { 
                showToast("Error al guardar", "error"); 
                window._isSaving = false;
                if (btnConf) {
                    btnConf.disabled = false;
                    btnConf.innerText = "💾 Confirmar [F2]";
                }
            }
        }


        function filtrar(cat) {
            categoriaActual = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === cat));
            render();
        }

        function abrirModalPago() {
            document.getElementById('pago-recibido').value = "";
            document.getElementById('pago-cambio').innerText = "$ 0";
            document.getElementById('modalPago').style.display = 'flex';
            document.getElementById('pago-total').innerText = document.getElementById('total-dinero').innerText;
            document.getElementById('pago-recibido').focus();
        }
        function cerrarModalPago() { 
            document.getElementById('modalPago').style.display = 'none'; 
            document.getElementById('buscador').focus();
        }
        
        function calcularCambio() {
            const tText = document.getElementById('pago-total').innerText.replace(/[^\d]/g, "");
            const t = parseFloat(tText) || 0;
            const r = parseFloat(document.getElementById('pago-recibido').value) || 0;
            document.getElementById('pago-cambio').innerText = `$ ${API.formatNumber(r - t)}`;
        }

        function enviarPedido() {
            if(!idPedidoActual) return showToast("Guarde el pedido primero", "warning");
            const emp = config.empresa || {};
            const empName = (emp.nombre || "MI EMPRESA").toUpperCase();
            
            let msg = `*━━━━━━━━━━━━━━━━━━━━━━━━━*\n`;
            msg += `*🚀 ${empName}*\n`;
            msg += `*━━━━━━━━━━━━━━━━━━━━━━━━━*\n`;
            if(emp.nit) msg += `*NIT:* ${emp.nit}\n`;
            if(emp.telefono) msg += `*TEL:* ${emp.telefono}\n`;
            if(emp.direccion) msg += `*DIR:* ${emp.direccion}\n`;
            msg += `---------------------------------------------------------\n`;
            msg += `*PEDIDO:* #${idPedidoActual}\n`;
            msg += `*CLIENTE:* ${clienteLogueado.toUpperCase()}\n`;
            msg += `*FECHA:* ${new Date().toLocaleString()}\n`;
            msg += `---------------------------------------------------------\n`;
            msg += `*CANT | PRODUCTO | SUBTOTAL*\n`;
            msg += `---------------------------------------------------------\n`;
            
            let total = 0; let totalBase = 0; let totalIva = 0;
            const modoIva = (config.empresa && config.empresa.ivaModo) || 'incluido';

            for (let ref in carrito) {
                const it = carrito[ref];
                const pInfo = productos.find(x => x.codigo === ref) || {};
                const perc = pInfo.ivaPorcentaje || 0;
                const calc = API.calcularIVA(it.precio * it.cantidad, perc, modoIva);
                
                const unitNeto = Math.round(it.precio / (1 + (perc / 100)));
                const unitIva = Math.round(it.precio - unitNeto);

                total += calc.total;
                totalBase += calc.base;
                totalIva += calc.iva;

                msg += `🔹 *[${it.referencia}]* ${it.nombre}\n`;
                msg += `    ${it.cantidad} ${it.unidad || 'Und'} x $${Math.round(it.precio).toLocaleString()} (Neto: $${unitNeto.toLocaleString()} | IVA: $${unitIva.toLocaleString()}) = *$${Math.round(calc.total).toLocaleString()}*\n`;
                msg += `---------------------------------------------------------\n`;
            }
            
            msg += `---------------------------------------------------------\n`;
            msg += `*BASE GRAVABLE: $${Math.round(totalBase).toLocaleString()}*\n`;
            msg += `*IVA TOTAL: $${Math.round(totalIva).toLocaleString()}*\n`;
            msg += `*TOTAL PEDIDO: $${Math.round(total).toLocaleString()}*\n`;
            msg += `---------------------------------------------------------\n`;
            msg += `_Enviado desde el Punto de Venta_`;

            const tel = (config.empresa && config.empresa.proveedor) || "573182744758";
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function reiniciarPedido() {
            if (Object.keys(carrito).length > 0) {
                mostrarConfirmacion("¿REINICIAR VENTA?", "¿Deseas vaciar el pedido actual?", () => {
                    ejecutarReinicio();
                });
            } else {
                ejecutarReinicio();
            }
        }

        function ejecutarReinicio() {
            window._isSaving = false;
            carrito = {};
            idPedidoActual = null;
            const btnConf = document.getElementById('btn-confirmar');
            if (btnConf) {
                btnConf.disabled = false;
                btnConf.innerText = "💾 Confirmar [F2]";
            }
            
            const mapping = {
                'btn-bill': 'permExcel',
                'btn-print': 'permPrint',
                'btn-ticket': 'permTicket',
                'btn-send': 'permWA',
                'btn-dian': 'permDian'
            };

            Object.keys(mapping).forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.disabled = true;
                    const permKey = mapping[id];
                    if (localStorage.getItem('userRol') !== 'admin' && localStorage.getItem(permKey) === 'false') {
                        el.style.display = 'none';
                    } else {
                        el.style.display = 'block';
                    }
                    if (id === 'btn-dian') el.innerHTML = "⚡ DIAN [F11]";
                }
            });
            
            const out = document.getElementById('dian-outputs');
            if(out) out.style.display = 'none';

            actualizarTabla();
            localStorage.removeItem('carrito_pro_ventas');
            localStorage.removeItem('id_pedido_temp');
            render();
            
            const b = document.getElementById('buscador');
            b.value = "";
            refocarBuscador(); // Blindaje de foco
            showToast("Venta reiniciada", "info");
        }

        // --- BLINDAJE DE FOCO MAESTRO ---
        function refocarBuscador() {
            const b = document.getElementById('buscador');
            if (!b) return;
            b.disabled = false;
            b.readOnly = false;
            // Doble ciclo para asegurar que el navegador rinda y limpie capas
            setTimeout(() => {
                b.blur();
                setTimeout(() => {
                    b.focus();
                    // Colocar el cursor al final si hay texto
                    const val = b.value;
                    b.value = '';
                    b.value = val;
                }, 50);
            }, 50);
        }

        function mostrarConfirmacion(titulo, msg, onSi) {
            document.getElementById('confirm-title').innerText = titulo;
            document.getElementById('confirm-msg').innerText = msg;
            const btnSi = document.getElementById('confirm-btn-yes');
            btnSi.onclick = () => {
                onSi();
                cerrarConfirmacion();
            };
            document.getElementById('modalConfirm').style.display = 'flex';
            // Enfocar el botón de aceptar para permitir ENTER inmediato
            setTimeout(() => btnSi.focus(), 50);
        }

        async function reportarDIAN() {
            if (!idPedidoActual) return showToast("Guarde el pedido primero", "warning");
            const btn = document.getElementById('btn-dian');
            const outputs = document.getElementById('dian-outputs');
            
            btn.innerHTML = "⏳ Enviando...";
            btn.disabled = true;

            try {
                // Si ya fue reportado, solo mostramos los botones
                // Pero el código original permitía reportar siempre
                await API.reportarPedidoADian(idPedidoActual);
                
                showToast("Reporte enviado con éxito (Simulación)", "success");
                btn.style.display = 'none'; // Ocultamos el botón principal de reporte
                if(outputs) outputs.style.display = 'flex'; // Mostramos PDF y XML
            } catch (e) {
                showToast("Error DIAN: " + e.message, "error");
                btn.innerHTML = "⚡ DIAN [F11]";
                btn.disabled = false;
            }
        }

        async function generarPDFDIAN() {
            if (!idPedidoActual) return showToast("No hay pedido seleccionado", "warning");
            showToast("Preparando documento...", "info");
            try {
                const url = await API.obtenerDocumentoDIAN(idPedidoActual, 'pdf');
                window.open(url, '_blank');
            } catch (e) {
                showToast("Error: " + e.message, "error");
            }
        }

        async function descargarXMLDIAN() {
            if (!idPedidoActual) return showToast("No hay pedido seleccionado", "warning");
            showToast("Preparando XML...", "info");
            try {
                const url = await API.obtenerDocumentoDIAN(idPedidoActual, 'xml');
                const a = document.createElement('a');
                a.href = url;
                a.download = `Factura_DIAN_${idPedidoActual}.xml`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (e) {
                showToast("Error: " + e.message, "error");
            }
        }

        function abrirZoom(src) {
            if(!src || src.includes('undefined') || src.includes('null')) src = API.DEFAULT_IMAGE;
            document.getElementById('imgGrande').src = src;
            document.getElementById('modalZoom').style.display = 'flex';
        }

        window.onload = async () => {
            await validarPermisos();
            await cargarData();
            cargarCarrito();
            refocarBuscador();
        };

        // --- SISTEMA DE ATAJOS ROBUSTO ---
        document.addEventListener('keydown', (e) => {
            const btnConf = document.getElementById('btn-confirmar');
            
            // F1: Enfoque Buscador
            if(e.key === 'F1') {
                e.preventDefault();
                e.stopImmediatePropagation();
                refocarBuscador();
            }
            // F2: Confirmar / Guardar
            if(e.key === 'F2' && btnConf && !btnConf.disabled) {
                e.preventDefault();
                abrirModalPago();
            }
            // F3: Nuevo / Limpiar (Prevenir Buscar del Navegador)
            if(e.key === 'F3') { 
                e.preventDefault(); 
                e.stopImmediatePropagation();
                reiniciarPedido(); 
            }
            // F4: Imprimir
            if(e.key === 'F4') {
                e.preventDefault();
                const btn = document.getElementById('btn-print');
                if(btn && !btn.disabled) abrirModalPrint();
            }
            // F11: Reporte DIAN
            if(e.key === 'F11') {
                e.preventDefault();
                const btn = document.getElementById('btn-dian');
                const hasPerm = localStorage.getItem('userRol') === 'admin' || localStorage.getItem('permDian') !== 'false';
                if(btn && !btn.disabled && hasPerm) reportarDIAN();
            }
            // F5: Ticket WhatsApp
            if(e.key === 'F5') {
                e.preventDefault();
                const btn = document.getElementById('btn-ticket');
                if(btn && !btn.disabled) abrirModalTicket();
            }
            // F6: Enviar WhatsApp Proveedor
            if(e.key === 'F6') {
                e.preventDefault();
                const btn = document.getElementById('btn-send');
                if(btn && !btn.disabled) enviarPedido();
            }
            
            if(e.key === 'Enter') {
                const mc = document.getElementById('modalConfirm');
                if(mc && mc.style.display === 'flex') {
                    e.preventDefault();
                    document.getElementById('confirm-btn-yes').click();
                }
            }
            
            if(e.key === 'Escape') {
                cerrarModalPago();
                cerrarModalPrint();
                cerrarModalTicket();
                cerrarConfirmacion();
                const mz = document.getElementById('modalZoom');
                if(mz) mz.style.display = 'none';
                refocarBuscador();
            }
        }, false);

        // Recuperar foco al hacer click en zonas vacías
        document.body.onclick = (e) => {
            if(e.target.tagName === 'BODY' || e.target.classList.contains('container') || e.target.id === 'lista') {
                refocarBuscador();
            }
        };

        // Recuperar foco al volver a la ventana (Minimizar/Maximizar / ALT+TAB)
        window.onfocus = () => {
            refocarBuscador();
        };
    </script>
